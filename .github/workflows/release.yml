name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate semantic version tag
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck shfmt

      - name: Validate release sources
        run: |
          bash -n bin/foxly-motd install.sh docs/install.sh motd/* libexec/* tests/integration.sh
          shellcheck -x bin/foxly-motd install.sh docs/install.sh motd/* libexec/* tests/integration.sh
          shfmt -i 4 -ci -sr -d bin/foxly-motd install.sh docs/install.sh motd/* libexec/* tests/integration.sh
          bash tests/integration.sh
          node tests/web.js

      - name: Build release archive
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          STAGE="release-stage"
          mkdir -p "$STAGE/bin" "$STAGE/motd" "$STAGE/libexec" "$STAGE/systemd" "$STAGE/config"
          cp bin/foxly-motd "$STAGE/bin/foxly-motd"
          cp motd/* "$STAGE/motd/"
          cp libexec/* "$STAGE/libexec/"
          cp systemd/* "$STAGE/systemd/"
          cp config/foxly-motd "$STAGE/config/foxly-motd"
          cp install.sh LICENSE README.md "$STAGE/"
          sed -i "s/VERSION=\"dev\"/VERSION=\"$VERSION\"/" "$STAGE/bin/foxly-motd"
          printf '%s\n' "$VERSION" > "$STAGE/VERSION"
          chmod +x "$STAGE/install.sh" "$STAGE/bin/foxly-motd" "$STAGE/motd/"* "$STAGE/libexec/"*
          tar -czf "foxly-motd-${VERSION}.tar.gz" -C "$STAGE" .
          sha256sum "foxly-motd-${VERSION}.tar.gz" > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "foxly-motd-${GITHUB_REF_NAME#v}.tar.gz" checksums.txt \
            --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
